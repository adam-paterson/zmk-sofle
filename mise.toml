[settings]
experimental = true

[tools]
python = "3.13"
uv = "latest"
cmake = "latest"
ninja = "latest"
protobuf = "latest"
dtc = "latest"          # Device tree compiler for ZMK

[env]
KEYBOARD = { value = "eyelash_sofle", description = "Keyboard variant to build (e.g., eyelash_sofle, sofle_choc)" }
KEYMAP = { value = "eyelash_sofle", description = "Keymap name to use (defaults to keyboard name)" }

# ============================================================================
# LEGACY TASKS (backward compatibility - ZMK only)
# These tasks reference the old directory structure
# ============================================================================

[tasks.setup]
description = "Initialize the local west workspace and fetch ZMK dependencies"
run = '''
#!/usr/bin/env bash
set -euo pipefail

echo "Firmware builds require the Zephyr SDK or an equivalent arm-none-eabi toolchain installed on macOS."

if [ ! -d .west ]; then
  uv run west init -l config
fi

uv run west update
uv run west zephyr-export
'''

[tasks.update]
description = "Refresh west dependencies without changing tracked sources"
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [ ! -d .west ]; then
  uv run west init -l config
fi

uv run west update
uv run west zephyr-export
'''

[tasks.draw]
description = "Regenerate the committed keymap drawer YAML and SVG for KEYBOARD"
sources = [
  "config/keyboards/{{env.KEYBOARD}}/keymap/{{env.KEYBOARD}}.keymap",
  "keymap_drawer.config.yaml",
  "config/keyboards/{{env.KEYBOARD}}/{{env.KEYBOARD}}.json",
]
outputs = [
  "keymap-drawer/{{env.KEYBOARD}}.yaml",
  "keymap-drawer/{{env.KEYBOARD}}.svg",
]
run = '''
#!/usr/bin/env bash
set -euo pipefail

KEYBOARD="${KEYBOARD:-eyelash_sofle}"

echo "Drawing keymap for keyboard: $KEYBOARD"

mkdir -p keymap-drawer
uv run keymap -c keymap_drawer.config.yaml parse -z "config/keyboards/${KEYBOARD}/keymap/${KEYBOARD}.keymap" > "keymap-drawer/${KEYBOARD}.yaml"
uv run keymap -c keymap_drawer.config.yaml draw "keymap-drawer/${KEYBOARD}.yaml" -o "keymap-drawer/${KEYBOARD}.svg"
echo "Generated: keymap-drawer/${KEYBOARD}.yaml and keymap-drawer/${KEYBOARD}.svg"
'''

[tasks.build]
description = "Build firmware for KEYBOARD (default: eyelash_sofle)"
run = '''
#!/usr/bin/env bash
set -euo pipefail

KEYBOARD="${KEYBOARD:-eyelash_sofle}"
KEYMAP="${KEYMAP:-$KEYBOARD}"

echo "Building firmware for keyboard: $KEYBOARD, keymap: $KEYMAP"

# Validate keyboard exists
if [ ! -d "config/keyboards/${KEYBOARD}" ]; then
  echo "Error: Keyboard '${KEYBOARD}' not found in config/keyboards/"
  echo "Available keyboards:"
  ls -1 config/keyboards/
  exit 1
fi

# Check for arm-none-eabi-gcc (preferred) or Zephyr SDK
if command -v arm-none-eabi-gcc &> /dev/null; then
  echo "Using GNU Arm Embedded toolchain"
  export ZEPHYR_TOOLCHAIN_VARIANT=gnuarmemb
elif [ -n "${ZEPHYR_SDK_INSTALL_DIR:-}" ]; then
  echo "Using Zephyr SDK"
else
  echo "Warning: No ARM toolchain found. Install arm-none-eabi-gcc or Zephyr SDK."
  echo "  macOS: brew install arm-none-eabi-gcc"
  exit 1
fi

# Build with west
uv run west build -s zmk/app -b "${KEYBOARD}_left" -- -DZMK_CONFIG="${PWD}/config" -DKEYMAP="${KEYMAP}" -DCONFIG_ZMK_STUDIO=y
uv run west build -s zmk/app -b "${KEYBOARD}_right" -- -DZMK_CONFIG="${PWD}/config" -DKEYMAP="${KEYMAP}"
'''

[tasks."build:left"]
description = "Build firmware for the left half with ZMK Studio support"
run = '''
#!/usr/bin/env bash
set -euo pipefail

KEYBOARD="${KEYBOARD:-eyelash_sofle}"

# Ensure west workspace is initialized
if [ ! -d .west ]; then
  echo "Initializing west workspace..."
  uv run west init -l config
fi

# Check for arm-none-eabi-gcc (preferred) or Zephyr SDK
if command -v arm-none-eabi-gcc &> /dev/null; then
  echo "Using GNU Arm Embedded toolchain"
  export ZEPHYR_TOOLCHAIN_VARIANT=gnuarmemb
elif [ -n "${ZEPHYR_SDK_INSTALL_DIR:-}" ]; then
  echo "Using Zephyr SDK"
else
  echo "Warning: No ARM toolchain found. Install arm-none-eabi-gcc or Zephyr SDK."
  echo "  macOS: brew install arm-none-eabi-gcc"
  exit 1
fi

# Build with ZMK Studio enabled (matches CI artifact naming)
uv run west build -s zmk/app -d build/left -b "${KEYBOARD}_left" -- \
  -DZMK_CONFIG="${PWD}/config" \
  -DBOARD_ROOT="${PWD}" \
  -DCONFIG_ZMK_STUDIO=y

echo "Build complete: build/left/zephyr/zmk.uf2"
'''

[tasks."build:right"]
description = "Build firmware for the right half"
run = '''
#!/usr/bin/env bash
set -euo pipefail

KEYBOARD="${KEYBOARD:-eyelash_sofle}"

# Ensure west workspace is initialized
if [ ! -d .west ]; then
  echo "Initializing west workspace..."
  uv run west init -l config
fi

# Check for arm-none-eabi-gcc (preferred) or Zephyr SDK
if command -v arm-none-eabi-gcc &> /dev/null; then
  echo "Using GNU Arm Embedded toolchain"
  export ZEPHYR_TOOLCHAIN_VARIANT=gnuarmemb
elif [ -n "${ZEPHYR_SDK_INSTALL_DIR:-}" ]; then
  echo "Using Zephyr SDK"
else
  echo "Warning: No ARM toolchain found. Install arm-none-eabi-gcc or Zephyr SDK."
  echo "  macOS: brew install arm-none-eabi-gcc"
  exit 1
fi

# Build right half (no studio needed on right)
uv run west build -s zmk/app -d build/right -b "${KEYBOARD}_right" -- \
  -DZMK_CONFIG="${PWD}/config" \
  -DBOARD_ROOT="${PWD}"

echo "Build complete: build/right/zephyr/zmk.uf2"
'''

[tasks."build:all"]
description = "Build firmware for both halves"
depends = ["build:left", "build:right"]

[tasks.flash]
description = "Flash firmware to the keyboard (detects bootloader automatically)"
run = '''
#!/usr/bin/env bash
set -euo pipefail

# Detect OS
if [[ "$OSTYPE" == "darwin"* ]]; then
  MOUNT_BASE="/Volumes"
  COPY_CMD="cp"
elif [[ "$OSTYPE" == "linux-gnu"* ]]; then
  MOUNT_BASE="/media/$USER"
  COPY_CMD="cp"
else
  echo "Unsupported OS: $OSTYPE"
  exit 1
fi

# Determine which firmware to flash
SIDE="${1:-left}"
if [ "$SIDE" = "left" ]; then
  FIRMWARE="build/left/zephyr/zmk.uf2"
  echo "Flashing LEFT half (with ZMK Studio)..."
elif [ "$SIDE" = "right" ]; then
  FIRMWARE="build/right/zephyr/zmk.uf2"
  echo "Flashing RIGHT half..."
else
  echo "Usage: mise run flash [left|right]"
  echo "  Default: left"
  exit 1
fi

if [ ! -f "$FIRMWARE" ]; then
  echo "Error: Firmware not found at $FIRMWARE"
  echo "Build first with: mise run build:$SIDE"
  exit 1
fi

echo "Waiting for bootloader drive (press reset twice on the $SIDE half)..."
echo "Looking for NICE_NANO or similar RPI-RP2 drive..."

# Wait for drive to appear
for i in {1..30}; do
  DRIVE=$(find "$MOUNT_BASE" -maxdepth 1 -type d \( -iname "*NICE_NANO*" -o -iname "*RPI-RP2*" -o -iname "*NICENANO*" \) 2>/dev/null | head -1 || true)
  if [ -n "$DRIVE" ]; then
    echo "Found bootloader drive: $DRIVE"
    echo "Copying firmware..."
    $COPY_CMD "$FIRMWARE" "$DRIVE/"
    echo "Done! The keyboard will reboot automatically."
    exit 0
  fi
  sleep 1
  echo -n "."
done

echo ""
echo "Error: No bootloader drive detected after 30 seconds."
echo "Make sure the keyboard half is in bootloader mode:"
echo "  1. Double-press the reset button quickly"
echo "  2. A USB drive named NICE_NANO or RPI-RP2 should appear"
exit 1
'''

[tasks.clean]
description = "Remove local build artifacts, fetched dependencies, and caches"
run = '''
#!/usr/bin/env bash
set -euo pipefail

rm -rf build .venv .west .zmk .keymap-drawer .zmk-python zmk modules zephyr eyelash_sofle
'''

[tasks.check]
description = "Validate local development environment setup"
run = "./scripts/setup-check.sh"

[tasks.list-keyboards]
description = "List available keyboard variants"
run = '''
#!/usr/bin/env bash
echo "Available keyboards in config/keyboards/:"
ls -1 config/keyboards/ 2>/dev/null || echo "  (none found)"
'''

# ============================================================================
# UNIFIED MULTI-FIRMWARE TASKS (new architecture)
# These tasks work with the new directory structure
# ============================================================================

[tasks."firmware:setup"]
description = "Setup all firmware workspaces (ZMK and QMK)"
depends = ["firmware:setup:zmk", "firmware:setup:qmk"]

[tasks."firmware:setup:zmk"]
description = "Initialize ZMK west workspace in firmware/zmk/"
run = '''
#!/usr/bin/env bash
set -euo pipefail

cd firmware/zmk

if [ ! -d .west ]; then
  echo "Initializing ZMK west workspace..."
  uv run west init -l .
fi

echo "Updating ZMK dependencies..."
uv run west update
uv run west zephyr-export

echo "ZMK workspace ready"
'''

[tasks."firmware:setup:qmk"]
description = "Setup QMK userspace in firmware/qmk/"
run = '''
#!/usr/bin/env bash
set -euo pipefail

cd firmware/qmk

echo "Setting up QMK userspace..."

# Check if qmk_cli is available
if ! command -v qmk &> /dev/null; then
  echo "QMK CLI not found. Install with: pip install qmk"
  echo "Note: QMK support is currently a placeholder. Full implementation pending."
  exit 0
fi

qmk setup --yes
echo "QMK workspace ready (placeholder)"
'''

[tasks."firmware:build"]
description = "Build all firmware for all targets"
depends = ["firmware:build:zmk"]
# TODO: Add "firmware:build:qmk" when QMK support is ready

[tasks."firmware:build:zmk"]
description = "Build ZMK firmware from firmware/zmk/build.yaml"
run = '''
#!/usr/bin/env bash
set -euo pipefail

cd firmware/zmk

if [ ! -d .west ]; then
  echo "ZMK workspace not initialized. Run: mise run firmware:setup:zmk"
  exit 1
fi

echo "Building ZMK firmware from build.yaml matrix..."
# Parse build.yaml and build each target
# For now, delegate to the legacy build command
uv run west build -s zmk/app -b eyelash_sofle_left -- -DZMK_CONFIG="${PWD}/config" -DBOARD_ROOT="${PWD}"
uv run west build -s zmk/app -b eyelash_sofle_right -- -DZMK_CONFIG="${PWD}/config" -DBOARD_ROOT="${PWD}"
'''

[tasks."firmware:build:qmk"]
description = "Build QMK firmware from firmware/qmk/qmk.json"
run = '''
#!/usr/bin/env bash
set -euo pipefail

echo "Building QMK firmware..."
echo "Note: QMK support is currently a placeholder. Full implementation pending."
echo ""
echo "Target keyboards from qmk.json:"
cat firmware/qmk/qmk.json | grep -o '"eyelash_[^"]*"' | head -5
'''

[tasks."firmware:build:sofle"]
description = "Build Sofle firmware for all supported firmware"
depends = ["firmware:build:sofle:zmk"]
# TODO: Add "firmware:build:sofle:qmk" when ready

[tasks."firmware:build:sofle:zmk"]
description = "Build Sofle ZMK firmware with studio support"
run = '''
#!/usr/bin/env bash
set -euo pipefail

cd firmware/zmk

if [ ! -d .west ]; then
