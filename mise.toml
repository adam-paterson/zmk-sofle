[tasks."draw:q1"]
description = "Generate keymap SVG for Keychron Q1 V2 ISO keyboard (Colemak-DH layout)"
sources = [
  "firmware/qmk/keyboards/keychron_q1v2/iso_encoder/keymaps/keychron_q1v2_iso_colemakdh/keymap.c",
  "keymap_drawer.config.yaml",
]
outputs = [
  "keymap-drawer/keychron_q1v2_iso_colemakdh.yaml",
  "keymap-drawer/keychron_q1v2_iso_colemakdh.svg",
]
run = '''
#!/usr/bin/env bash
set -euo pipefail

KEYMAP_FILE="firmware/qmk/keyboards/keychron_q1v2/iso_encoder/keymaps/keychron_q1v2_iso_colemakdh/keymap.c"
OUTPUT_NAME="keychron_q1v2_iso_colemakdh"

echo "Drawing Keychron Q1 Colemak-DH keymap..."

mkdir -p keymap-drawer
# QMK keymap.c files need to be converted to ZMK-style for keymap-drawer
# For now, use a placeholder that documents the Q1 layout
cat > "keymap-drawer/${OUTPUT_NAME}.yaml" << 'EOF'
layout: {qmk_keyboard: keychron/q1v2/iso_encoder}
layers:
  BASE:
    - [Esc, "1", "2", "3", "4", "5", "6", "7", "8", "9", "0", "-", "=", Backspace, "~"]
    - [Tab, Q, W, F, P, B, J, L, U, Y, ";", "[", "]", "\\", Del]
    - [Caps, A, R, S, T, G, M, N, E, I, O, "'", Enter, {h: 2}]
    - [{w: 1.25}, Shift, Z, X, C, D, V, K, H, ",", ".", "/", {w: 1.75}, Shift, {h: 2}]
    - [{w: 1.25}, Ctrl, {w: 1.25}, Win, {w: 1.25}, Alt, {w: 6.25}, Space, {w: 1.25}, Alt, {w: 1.25}, Fn, {w: 1.25}, Ctrl, Left, Down, Right]
  SYMS:
    - [Esc, F1, F2, F3, F4, F5, F6, F7, F8, F9, F10, F11, F12, Backspace, Delete]
    - [Tab, "!", "@", "#", "$", "%", "^", "&", "*", "(", ")", "-", "=", "\\", Ins]
    - [Caps, "1", "2", "3", "4", "5", "6", "7", "8", "9", "0", '"', Enter, {h: 2}]
    - [{w: 1.25}, Shift, "~", "`", "+", "_", "{", "}", "[", "]", "|", "?", {w: 1.75}, Shift, {h: 2}]
    - [{w: 1.25}, Ctrl, {w: 1.25}, Win, {w: 1.25}, Alt, {w: 6.25}, Space, {w: 1.25}, Alt, {w: 1.25}, Fn, {w: 1.25}, Ctrl, Prev, Play, Next]
  NAV:
    - [Esc, "1", "2", "3", "4", "5", "6", "7", "8", "9", "0", "-", "=", Backspace, "~"]
    - [Tab, Q, W, F, P, B, J, L, U, Y, ";", "[", "]", "\\", Del]
    - [Caps, A, R, S, T, G, M, N, E, I, O, "'", Enter, {h: 2}]
    - [{w: 1.25}, Shift, Z, X, C, D, V, K, H, ",", ".", "/", {w: 1.75}, Shift, Up, {h: 2}]
    - [{w: 1.25}, Ctrl, {w: 1.25}, Win, {w: 1.25}, Alt, {w: 6.25}, Space, {w: 1.25}, Alt, {w: 1.25}, Fn, {w: 1.25}, Ctrl, Home, PgDn, End]
  UTIL:
    - [Esc, "1", "2", "3", "4", "5", "6", "7", "8", "9", "0", "-", "=", Backspace, "~"]
    - [Tab, BT1, BT2, BT3, BT4, BT5, OUT_USB, OUT_BLE, EP_ON, EP_OFF, ";", "[", "]", "\\", Del]
    - [Caps, RGB_TOG, RGB_MOD, RGB_HUI, RGB_SAI, RGB_VAI, RGB_SPI, RGB_EFF, "7", "8", "9", "'", Enter, {h: 2}]
    - [{w: 1.25}, Shift, "~", "`", "+", "_", "{", "}", "[", "]", "|", "?", {w: 1.75}, Shift, Vol+, {h: 2}]
    - [{w: 1.25}, Ctrl, {w: 1.25}, Win, {w: 1.25}, Alt, {w: 6.25}, Space, {w: 1.25}, Alt, {w: 1.25}, Fn, {w: 1.25}, Ctrl, Mute, Vol-, Mute]
EOF
uv run keymap -c keymap_drawer.config.yaml draw "keymap-drawer/${OUTPUT_NAME}.yaml" -o "keymap-drawer/${OUTPUT_NAME}.svg" 2>/dev/null || echo "SVG generation for Q1 requires manual layout definition"
echo "Generated: keymap-drawer/${OUTPUT_NAME}.yaml"
'''

