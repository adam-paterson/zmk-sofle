# ============================================================================

[tasks."build:qmk:q1:colemakdh"]
description = "Build QMK firmware for Keychron Q1 V2 ISO with Colemak-DH layout"
run = '''
#!/usr/bin/env bash
set -euo pipefail

echo "Building QMK firmware for Keychron Q1 V2 ISO (Colemak-DH)..."

# Check if QMK CLI is available
if ! command -v qmk &> /dev/null; then
    echo "QMK CLI not found. Install with: pip install qmk"
    exit 1
fi

# Setup QMK userspace if not already configured
if [ ! -d firmware/qmk/.git ]; then
    echo "Setting up QMK userspace..."
    cd firmware/qmk
    qmk setup --yes
fi

# Configure overlay_dir to point to this repo
qmk config user.overlay_dir="${PWD}/firmware/qmk"

# Build the firmware
cd firmware/qmk
qmk compile -kb keychron/q1v2/iso_encoder -km keychron_q1v2_iso_colemakdh

echo "Build complete. Firmware location: firmware/qmk/.build/"
'''

