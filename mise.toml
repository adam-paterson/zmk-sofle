description = "Lint keymap definitions and configs"
run = '''
#!/usr/bin/env bash
set -euo pipefail

echo "Linting keymap files..."

# Check YAML syntax
echo "Checking layers.yaml..."
uv run python -c "import yaml; yaml.safe_load(open('lib/keymaps/layers.yaml'))"

# Check DTSI syntax
echo "Checking DTSI files..."
for f in lib/keymaps/**/*.dtsi; do
  if [ -f "$f" ]; then
    dtc -I dts -O dtb -o /dev/null "$f" 2>/dev/null || echo "Warning: $f has DTS syntax issues (non-fatal)"
  fi
done

echo "Lint complete"
'''

