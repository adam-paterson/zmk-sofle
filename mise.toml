[tasks."firmware:list"]
description = "List available firmware and keyboards"
run = '''
#!/usr/bin/env bash

echo "=== Available Firmware ==="
echo "ZMK targets from firmware/zmk/build.yaml:"
grep "board:" firmware/zmk/build.yaml | sed 's/.*board: /  - /'

echo ""
echo "QMK targets from firmware/qmk/qmk.json:"
grep -o '"keychron_[^"]*"' firmware/qmk/qmk.json 2>/dev/null | sed 's/"//g' | sort -u | sed 's/^/  - /'
grep -o '"eyelash_[^"]*"' firmware/qmk/qmk.json 2>/dev/null | sed 's/"//g' | sort -u | sed 's/^/  - /'

echo ""
echo "=== Available Build Tasks ==="
echo "Keychron Q1 V2 ISO:"
echo "  - mise run build:qmk:q1:colemakdh  # Colemak-DH layout"
echo "  - mise run build:qmk:q1:qwerty     # QWERTY layout"
echo "  - mise run build:qmk:q1:all        # Both layouts"

echo ""
echo "=== Shared Keymap Definitions ==="
echo "Available layouts in lib/keymaps/:"
find lib/keymaps -name "*.dtsi" -exec basename {} .dtsi \; 2>/dev/null | sed 's/^/  - /'
'''

