[tasks."firmware:build:sofle:qmk"]
description = "Build Sofle QMK firmware"
run = '''
#!/usr/bin/env bash
set -euo pipefail

echo "Building Sofle QMK firmware..."
echo "Note: QMK support is currently a placeholder."
'''

# Keymap conversion tasks
[tasks."keymap:convert"]
description = "Convert keymaps from shared definitions to firmware formats"
run = '''
#!/usr/bin/env bash
set -euo pipefail

echo "Converting shared keymaps to firmware-specific formats..."
uv run python scripts/keymap-convert.py --input lib/keymaps --output firmware/
echo "Conversion complete"
'''

[tasks."keymap:draw"]
description = "Regenerate all keymap diagrams from shared definitions"
sources = [
  "lib/keymaps/**/*.dtsi",
  "keymap_drawer.config.yaml",
]
outputs = [
  "keymap-drawer/output/*.svg",
]
run = '''
#!/usr/bin/env bash
set -euo pipefail

mkdir -p keymap-drawer/output

# Generate diagrams from shared keymaps
for keymap_file in lib/keymaps/base/*.dtsi lib/keymaps/miryoku/*.dtsi 2>/dev/null; do
  if [ -f "$keymap_file" ]; then
    name=$(basename "$keymap_file" .dtsi)
    echo "Processing $name..."
    
    # Convert to temporary ZMK format for keymap-drawer
    uv run python scripts/keymap-convert.py --input "$keymap_file" --to zmk --output "/tmp/${name}.keymap"
    
    # Generate diagram
    uv run keymap -c keymap_drawer.config.yaml parse -z "/tmp/${name}.keymap" > "keymap-drawer/output/${name}.yaml"
    uv run keymap -c keymap_drawer.config.yaml draw "keymap-drawer/output/${name}.yaml" -o "keymap-drawer/output/${name}.svg"
  fi
done

echo "Diagrams generated in keymap-drawer/output/"
'''

# Utility tasks
[tasks."firmware:clean"]
description = "Clean all firmware build artifacts"
run = '''
#!/usr/bin/env bash
set -euo pipefail

echo "Cleaning firmware build artifacts..."
rm -rf firmware/zmk/build firmware/zmk/.west firmware/qmk/.build
rm -rf keymap-drawer/output/*.svg
'''

[tasks."firmware:lint"]
description = "Lint keymap definitions and configs"
run = '''
#!/usr/bin/env bash
set -euo pipefail

echo "Linting keymap files..."

# Check YAML syntax
echo "Checking layers.yaml..."
uv run python -c "import yaml; yaml.safe_load(open('lib/keymaps/layers.yaml'))"

# Check DTSI syntax
echo "Checking DTSI files..."
for f in lib/keymaps/**/*.dtsi; do
  if [ -f "$f" ]; then
    dtc -I dts -O dtb -o /dev/null "$f" 2>/dev/null || echo "Warning: $f has DTS syntax issues (non-fatal)"
  fi
done

echo "Lint complete"
'''

[tasks."firmware:test"]
description = "Run tests on keymap conversions"
run = '''
#!/usr/bin/env bash
set -euo pipefail

echo "Running keymap conversion tests..."
echo "Note: Test suite to be implemented"
# TODO: Add pytest tests for keymap-convert.py
'''

[tasks."firmware:list"]
description = "List available firmware and keyboards"
run = '''
#!/usr/bin/env bash

echo "=== Available Firmware ==="
echo "ZMK targets from firmware/zmk/build.yaml:"
grep "board:" firmware/zmk/build.yaml | sed 's/.*board: /  - /'

echo ""
echo "QMK targets from firmware/qmk/qmk.json:"
grep -o '"eyelash_[^"]*"' firmware/qmk/qmk.json | sed 's/"//g' | sort -u | sed 's/^/  - /'

echo ""
echo "=== Shared Keymap Definitions ==="
echo "Available layouts in lib/keymaps/:"
find lib/keymaps -name "*.dtsi" -exec basename {} .dtsi \; | sed 's/^/  - /'
'''
