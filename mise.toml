# Keymap conversion tasks
[tasks."keymap:convert"]
description = "Convert keymaps from shared definitions to firmware formats"
run = '''
#!/usr/bin/env bash
set -euo pipefail

echo "Converting shared keymaps to firmware-specific formats..."
uv run python scripts/keymap-convert.py --input lib/keymaps --output firmware/
echo "Conversion complete"
'''

[tasks."keymap:draw"]
description = "Regenerate all keymap diagrams from shared definitions"
sources = [
  "lib/keymaps/**/*.dtsi",
  "keymap_drawer.config.yaml",
]
outputs = [
  "keymap-drawer/output/*.svg",
]
run = '''
#!/usr/bin/env bash
set -euo pipefail

mkdir -p keymap-drawer/output

# Generate diagrams from shared keymaps
for keymap_file in lib/keymaps/base/*.dtsi lib/keymaps/miryoku/*.dtsi 2>/dev/null; do
  if [ -f "$keymap_file" ]; then
    name=$(basename "$keymap_file" .dtsi)
    echo "Processing $name..."
    
    # Convert to temporary ZMK format for keymap-drawer
    uv run python scripts/keymap-convert.py --input "$keymap_file" --to zmk --output "/tmp/${name}.keymap"
    
    # Generate diagram
    uv run keymap -c keymap_drawer.config.yaml parse -z "/tmp/${name}.keymap" > "keymap-drawer/output/${name}.yaml"
    uv run keymap -c keymap_drawer.config.yaml draw "keymap-drawer/output/${name}.yaml" -o "keymap-drawer/output/${name}.svg"
  fi
done

echo "Diagrams generated in keymap-drawer/output/"
'''

