[settings]
experimental = true

[tools]
python = "3.13"
uv = "latest"
cmake = "latest"
ninja = "latest"
protobuf = "latest"
dtc = "latest"          # Device tree compiler for ZMK

[env]
KEYBOARD = { value = "eyelash_sofle", description = "Keyboard variant to build (e.g., eyelash_sofle, sofle_choc)" }
KEYMAP = { value = "eyelash_sofle", description = "Keymap name to use (defaults to keyboard name)" }

# ============================================================================
# LEGACY TASKS (backward compatibility - ZMK only)
# These tasks reference the old directory structure
# ============================================================================

[tasks.setup]
description = "Initialize the local west workspace and fetch ZMK dependencies"
run = '''
#!/usr/bin/env bash
set -euo pipefail

echo "Firmware builds require the Zephyr SDK or an equivalent arm-none-eabi toolchain installed on macOS."

if [ ! -d .west ]; then
  uv run west init -l config
fi

uv run west update
uv run west zephyr-export
'''

[tasks.update]
description = "Refresh west dependencies without changing tracked sources"
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [ ! -d .west ]; then
  uv run west init -l config
fi

uv run west update
uv run west zephyr-export
'''

[tasks.draw]
description = "Regenerate the committed keymap drawer YAML and SVG for KEYBOARD"
sources = [
  "config/keyboards/{{env.KEYBOARD}}/keymap/{{env.KEYBOARD}}.keymap",
  "keymap_drawer.config.yaml",
  "config/keyboards/{{env.KEYBOARD}}/{{env.KEYBOARD}}.json",
]
outputs = [
  "keymap-drawer/{{env.KEYBOARD}}.yaml",
  "keymap-drawer/{{env.KEYBOARD}}.svg",
]
run = '''
#!/usr/bin/env bash
set -euo pipefail

KEYBOARD="${KEYBOARD:-eyelash_sofle}"

echo "Drawing keymap for keyboard: $KEYBOARD"

mkdir -p keymap-drawer
uv run keymap -c keymap_drawer.config.yaml parse -z "config/keyboards/${KEYBOARD}/keymap/${KEYBOARD}.keymap" > "keymap-drawer/${KEYBOARD}.yaml"
uv run keymap -c keymap_drawer.config.yaml draw "keymap-drawer/${KEYBOARD}.yaml" -o "keymap-drawer/${KEYBOARD}.svg"
echo "Generated: keymap-drawer/${KEYBOARD}.yaml and keymap-drawer/${KEYBOARD}.svg"
'''

# ============================================================================
# UNIFIED DRAW TASKS (new architecture - no sed, explicit paths)
# ============================================================================

[tasks."draw:sofle"]
description = "Generate keymap SVG for Sofle keyboard (Colemak-DH layout)"
sources = [
  "firmware/zmk/config/keyboards/eyelash_sofle/keymap/eyelash_sofle_colemakdh.keymap",
  "keymap_drawer.config.yaml",
  "firmware/zmk/config/keyboards/eyelash_sofle/eyelash_sofle.json",
]
outputs = [
  "keymap-drawer/eyelash_sofle_colemakdh.yaml",
  "keymap-drawer/eyelash_sofle_colemakdh.svg",
]
run = '''
#!/usr/bin/env bash
set -euo pipefail

KEYMAP_FILE="firmware/zmk/config/keyboards/eyelash_sofle/keymap/eyelash_sofle_colemakdh.keymap"
OUTPUT_NAME="eyelash_sofle_colemakdh"

echo "Drawing Sofle Colemak-DH keymap..."

mkdir -p keymap-drawer
uv run keymap -c keymap_drawer.config.yaml parse -z "${KEYMAP_FILE}" > "keymap-drawer/${OUTPUT_NAME}.yaml"
uv run keymap -c keymap_drawer.config.yaml draw "keymap-drawer/${OUTPUT_NAME}.yaml" -o "keymap-drawer/${OUTPUT_NAME}.svg"
echo "Generated: keymap-drawer/${OUTPUT_NAME}.yaml and keymap-drawer/${OUTPUT_NAME}.svg"
'''

[tasks."draw:sofle:qwerty"]
description = "Generate keymap SVG for Sofle keyboard (QWERTY layout)"
sources = [
  "firmware/zmk/config/keyboards/eyelash_sofle/keymap/eyelash_sofle_qwerty.keymap",
  "keymap_drawer.config.yaml",
  "firmware/zmk/config/keyboards/eyelash_sofle/eyelash_sofle.json",
]
outputs = [
  "keymap-drawer/eyelash_sofle_qwerty.yaml",
  "keymap-drawer/eyelash_sofle_qwerty.svg",
