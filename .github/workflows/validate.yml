name: Validate Keymaps

on:
  workflow_dispatch:
  push:
    paths:
      - "config/**"
      - ".github/workflows/validate.yml"
  pull_request:
    paths:
      - "config/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      - name: Validate keymap syntax
        run: |
          set -e
          echo "Validating keymap files..."

          # Find all .keymap files recursively
          find config -name "*.keymap" -type f | while read -r keymap; do
            echo "Checking: $keymap"

            # Get the base name and directory for the corresponding JSON file
            basename=$(basename "$keymap" .keymap)
            keymap_dir=$(dirname "$keymap")
            json_file="${keymap_dir}/${basename}.json"

            # Also check parent directory (keyboard level) for JSON
            parent_dir=$(dirname "$keymap_dir")
            json_file_alt="${parent_dir}/${basename}.json"

            if [ -f "$json_file" ]; then
              echo "  - Found layout: $json_file"
            elif [ -f "$json_file_alt" ]; then
              echo "  - Found layout: $json_file_alt"
              json_file="$json_file_alt"
            else
              echo "  ⚠ No layout JSON found for $keymap"
              continue
            fi

            # Try to parse the keymap
            if keymap -c keymap_drawer.config.yaml parse -z "$keymap" > /dev/null 2>&1; then
              echo "  ✓ Syntax valid"
            else
              echo "  ✗ Syntax error in $keymap"
              keymap -c keymap_drawer.config.yaml parse -z "$keymap" || true
              exit 1
            fi
          done

          echo ""
          echo "All keymap files validated successfully!"

      - name: Check JSON layout files
        run: |
          set -e
          echo "Validating JSON layout files..."

          # Find all JSON files recursively
          find config -name "*.json" -type f | while read -r json; do
            echo "Checking: $json"

            # Validate JSON syntax
            if python3 -c "import json; json.load(open('$json'))" 2>/dev/null; then
              echo "  ✓ JSON syntax valid"
            else
              echo "  ✗ JSON syntax error in $json"
              python3 -c "import json; json.load(open('$json'))"
              exit 1
            fi

            # Check required fields
            if python3 << EOF
import json
import sys

with open('$json') as f:
    data = json.load(f)

required = ['id', 'name', 'layouts']
for field in required:
    if field not in data:
        print(f"  ✗ Missing required field: {field}")
        sys.exit(1)

# Check layout structure
if 'layouts' in data and 'default_layout' in data['layouts']:
    layout = data['layouts']['default_layout']
    if 'layout' not in layout:
        print("  ✗ Missing layout array in default_layout")
        sys.exit(1)
    else:
        print(f"  ✓ Layout has {len(layout['layout'])} keys defined")
else:
    print("  ⚠ No default_layout found")

print("  ✓ Structure valid")
EOF
            then
              echo "  ✓ Layout structure valid"
            else
              echo "  ✗ Layout structure error"
              exit 1
            fi
          done

          echo ""
          echo "All JSON layout files validated successfully!"

      - name: Check for orphaned files
        run: |
          echo "Checking for orphaned keymap/layout files..."

          # Find keymaps without corresponding JSON
          find config -name "*.keymap" -type f | while read -r keymap; do
            basename=$(basename "$keymap" .keymap)
            keymap_dir=$(dirname "$keymap")
            parent_dir=$(dirname "$keymap_dir")
            json_file="${keymap_dir}/${basename}.json"
            json_file_alt="${parent_dir}/${basename}.json"

            if [ ! -f "$json_file" ] && [ ! -f "$json_file_alt" ]; then
              echo "  ⚠ Keymap without JSON: $keymap"
            fi
          done

          # Find JSON without corresponding keymaps
          find config -name "*.json" -type f | while read -r json; do
            basename=$(basename "$json" .json)
            json_dir=$(dirname "$json")
            keymap_file="${json_dir}/keymap/${basename}.keymap"
            keymap_file_alt="${json_dir}/${basename}.keymap"

            if [ ! -f "$keymap_file" ] && [ ! -f "$keymap_file_alt" ]; then
              echo "  ⚠ JSON without keymap: $json"
            fi
          done

          echo ""
          echo "Orphan check complete!"

      - name: Summary
        if: always()
        run: |
          echo "==================================="
          echo "Keymap Validation Summary"
          echo "==================================="
          echo "Validated keymap files:"
          find config -name "*.keymap" -type f 2>/dev/null || echo "  None found"
          echo ""
          echo "Validated layout files:"
          find config -name "*.json" -type f 2>/dev/null || echo "  None found"
          echo ""
          echo "==================================="
