name: Draw Keymap
on:
  workflow_dispatch:
    inputs:
      keyboard:
        description: 'Keyboard to draw (sofle, q1, or all)'
        required: false
        default: 'all'
      layout:
        description: 'Layout to draw (colemakdh, qwerty, or all)'
        required: false
        default: 'all'
  push:
    paths:
      - "firmware/zmk/config/keyboards/**/keymap/*.keymap"
      - "firmware/qmk/keyboards/**/keymaps/**/keymap.c"
      - "lib/keymaps/**"
      - .github/workflows/draw.yml
      - keymap_drawer.config.yaml

jobs:
  draw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Draw Sofle Keymaps
        if: github.event.inputs.keyboard == 'sofle' || github.event.inputs.keyboard == 'all' || github.event.inputs.keyboard == ''
        run: |
          if [ "${{ github.event.inputs.layout }}" = "colemakdh" ] || [ "${{ github.event.inputs.layout }}" = "all" ] || [ -z "${{ github.event.inputs.layout }}" ]; then
            echo "Drawing Sofle Colemak-DH..."
            mise run draw:sofle
          fi
          if [ "${{ github.event.inputs.layout }}" = "qwerty" ] || [ "${{ github.event.inputs.layout }}" = "all" ] || [ -z "${{ github.event.inputs.layout }}" ]; then
            echo "Drawing Sofle QWERTY..."
            mise run draw:sofle:qwerty
          fi

      - name: Draw Q1 Keymaps
        if: github.event.inputs.keyboard == 'q1' || github.event.inputs.keyboard == 'all' || github.event.inputs.keyboard == ''
        run: |
          if [ "${{ github.event.inputs.layout }}" = "colemakdh" ] || [ "${{ github.event.inputs.layout }}" = "all" ] || [ -z "${{ github.event.inputs.layout }}" ]; then
            echo "Drawing Q1 Colemak-DH..."
            mise run draw:q1
          fi
          if [ "${{ github.event.inputs.layout }}" = "qwerty" ] || [ "${{ github.event.inputs.layout }}" = "all" ] || [ -z "${{ github.event.inputs.layout }}" ]; then
            echo "Drawing Q1 QWERTY..."
            mise run draw:q1:qwerty
          fi

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add keymap-drawer/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[Draw] Regenerate keymap diagrams ($(date -I))"
            git push
          fi
