name: Draw Keymap
on:
  workflow_dispatch:
  push:
    paths:
      - "config/**"
      - .github/workflows/draw.yml
      - keymap_drawer.config.yaml

jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@v0.23.0
    permissions:
      contents: write
    with:
      commit_message: "[Draw] Sync keymap diagram"
      destination: "commit"
      fail_on_error: ${{ fromJSON(true) }}
