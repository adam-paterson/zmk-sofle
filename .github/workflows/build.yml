name: Build All Firmware
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "keymap-drawer/**"
      - "keymap-drawer/output/**"
      - "docs/**"
      - "*.md"
      - "refinery/**"
  pull_request:
    paths-ignore:
      - "keymap-drawer/output/**"
      - "docs/**"
      - "*.md"

jobs:
  # Generate build matrix from config files
  matrix:
    runs-on: ubuntu-latest
    outputs:
      zmk-matrix: ${{ steps.zmk-matrix.outputs.matrix }}
      qmk-matrix: ${{ steps.qmk-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate ZMK Build Matrix
        id: zmk-matrix
        run: |
          if [ -f firmware/zmk/build.yaml ]; then
            matrix=$(yq -o json firmware/zmk/build.yaml 2>/dev/null | jq -c '.include' 2>/dev/null || echo '[]')
            echo "matrix={\"include\":$matrix}" >> $GITHUB_OUTPUT
          else
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
          fi

      - name: Generate QMK Build Matrix
        id: qmk-matrix
        run: |
          if [ -f firmware/qmk/qmk.json ]; then
            matrix=$(cat firmware/qmk/qmk.json | jq -c '.keyboards | to_entries | map({keyboard: .key, keymaps: .value.keymaps})' 2>/dev/null || echo '[]')
            echo "matrix={\"include\":$matrix}" >> $GITHUB_OUTPUT
          else
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
          fi

  # Setup check for development environment
  setup-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Run setup validation
        run: |
          echo "🔧 Running development environment validation..."
          ./scripts/setup-check.sh || echo "Setup check completed with warnings"

  # Build ZMK firmware using matrix
  build-zmk:
    needs: [matrix, setup-check]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.matrix.outputs.zmk-matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build ZMK firmware
        uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
        # Pass the build.yaml configuration to ZMK workflow
        # The workflow reads firmware/zmk/build.yaml automatically

  # Build QMK firmware using matrix (placeholder)
  build-qmk:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.matrix.outputs.qmk-matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup QMK
        run: |
          echo "QMK build support is currently a placeholder"
          echo "Keyboard: ${{ matrix.keyboard }}"
          echo "Keymaps: ${{ toJson(matrix.keymaps) }}"
          echo "Full QMK userspace integration coming in Phase 3"

  # Collect all artifacts and create release
  release:
    runs-on: ubuntu-latest
    needs: [build-zmk, build-qmk]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download ZMK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: zmk-firmware-*
          merge-multiple: true
          path: firmware-output/zmk
        continue-on-error: true

      - name: Download QMK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: qmk-firmware-*
          merge-multiple: true
          path: firmware-output/qmk
        continue-on-error: true

      - name: List artifacts
        run: |
          echo "=== ZMK Artifacts ==="
          ls -la firmware-output/zmk/ 2>/dev/null || echo "No ZMK artifacts"
          echo ""
          echo "=== QMK Artifacts ==="
          ls -la firmware-output/qmk/ 2>/dev/null || echo "No QMK artifacts (expected - placeholder phase)"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: firmware-${{ github.run_number }}
          name: Multi-Firmware Build #${{ github.run_number }}
          body: |
            ## Multi-Firmware Keyboard Build

            Built from commit: ${{ github.sha }}

            ### Firmware Types
            - **ZMK**: Zephyr-based firmware with ZMK Studio support
            - **QMK**: Quantum Mechanical Keyboard firmware *(placeholder - Phase 3)*

            ### Download
            Firmware files are attached to this release below.

            ### ZMK Files
            | File | Purpose |
            |------|---------|
            | `adams_sofle_studio_left.uf2` | Left side with ZMK Studio support |
            | `adams_sofle_right.uf2` | Right side firmware |
            | `settings_reset-nice_nano_v2-zmk.uf2` | Clear Bluetooth/settings |

            ### Flashing Instructions
            1. Download `firmware.zip` from the Assets section below
            2. Extract the `.uf2` files
            3. Put each keyboard half in bootloader mode (press reset button twice quickly)
            4. Copy the appropriate `.uf2` file to each half
            5. Keyboard will auto-reboot when done

            ### Keymap Layers
            - **BASE** (Layer 0): Standard typing (QWERTY/Colemak)
            - **SYMS** (Layer 1): F-keys, numbers, and symbols (hold left inner thumb)
            - **NAV** (Layer 2): Navigation and editing (hold right inner thumb)
            - **UTIL** (Layer 3): Bluetooth, RGB, and system controls (hold SYMS + NAV)
            - **CODE** (Layer 4): macOS programming shortcuts (hold the outer right Command thumb)

            ### Combos
            - `Q + S + Z` (hold 2 sec) = Deep sleep mode

            ### Troubleshooting
            **Bluetooth won't connect?**
            1. Flash `settings_reset-nice_nano_v2-zmk.uf2` to **both halves**
            2. Then flash the normal firmware again
            3. Re-pair from your device

            **Split halves won't pair?**
            - Reset both halves at the same time (press both reset buttons)
            - Or flash settings_reset to both and start fresh

            ---
            *This is a multi-firmware build. QMK support is in development (Phase 3).*
          draft: false
          prerelease: false
          files: |
            firmware-output/zmk/*.uf2
            firmware-output/zmk/*.hex
            firmware-output/qmk/*.bin
            firmware-output/qmk/*.hex
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    runs-on: ubuntu-latest
    needs: [build-zmk, release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && always() && needs.build-zmk.result == 'success'
    permissions:
      contents: write
    steps:
      - name: Comment on commit with download link
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releaseUrl = `https://github.com/${{ github.repository }}/releases/tag/firmware-${{ github.run_number }}`;
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `## Multi-firmware build complete

            [Download latest firmware](${releaseUrl})

            [View build details](${runUrl})

            ### Files in this build:
            | File | For Side |
            |------|----------|
            | \`adams_sofle_studio_left.uf2\` | Left (with ZMK Studio) |
            | \`adams_sofle_right.uf2\` | Right |
            | \`settings_reset-nice_nano_v2-zmk.uf2\` | Settings reset |

            ### Quick Flash Steps:
            1. Click download link above
            2. Download \`firmware.zip\` from Assets
            3. Extract files
            4. Put keyboard in bootloader (press reset twice)
            5. Copy the correct \`.uf2\` to each keyboard drive`
            })
