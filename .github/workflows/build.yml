name: Build ZMK firmware
on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "keymap-drawer/**"
      - "README.md"
      - "*.md"

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v0.3.0

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: firmware

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: firmware-${{ github.run_number }}
          name: Firmware Build #${{ github.run_number }}
          body: |
            ## Sofle Keyboard Firmware
            
            Built from commit: ${{ github.sha }}
            
            ### Download
            ⬇️ **Firmware files are attached to this release below**
            
            ### Included Files
            | File | Purpose |
            |------|---------|
            | `eyelash_sofle_studio_left.uf2` | Left side with ZMK Studio support |
            | `eyelash_sofle_right.uf2` | Right side firmware |
            | `settings_reset-nice_nano_v2-zmk.uf2` | Clear Bluetooth/settings |
            
            ### Flashing Instructions
            1. Download `firmware.zip` from the Assets section below
            2. Extract the `.uf2` files
            3. Put each keyboard half in bootloader mode (press reset button twice quickly)
            4. Copy the appropriate `.uf2` file to each half
            5. Keyboard will auto-reboot when done
            
            ### Keymap Layers
            - **BASE** (Layer 0): Standard QWERTY typing
            - **LOWER** (Layer 1): F-keys, numbers, symbols (hold left inner thumb)
            - **RAISE** (Layer 2): Navigation, arrows, media (hold right inner thumb)
            - **UTIL** (Layer 3): Bluetooth, RGB, system settings (both thumbs + U)
            - **CODE** (Layer 4): Programming shortcuts (both thumbs + C)
            
            ### Combos
            - `Q + S + Z` (hold 2 sec) = Deep sleep mode
            - Both inner thumbs + U = UTIL layer
            - Both inner thumbs + C = CODE layer
            
            ### Troubleshooting
            **Bluetooth won't connect?**
            1. Flash `settings_reset-nice_nano_v2-zmk.uf2` to **both halves**
            2. Then flash the normal firmware again
            3. Re-pair from your device
            
            **Split halves won't pair?**
            - Reset both halves at the same time (press both reset buttons)
            - Or flash settings_reset to both and start fresh
          draft: false
          prerelease: false
          files: firmware/*.uf2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    runs-on: ubuntu-latest
    needs: [build, release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && always() && needs.build.result == 'success'
    steps:
      - name: Comment on commit with download link
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releaseUrl = `https://github.com/${{ github.repository }}/releases/tag/firmware-${{ github.run_number }}`;
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `## ✅ Firmware Build Complete!
            
            📦 **[Download Latest Firmware](${releaseUrl})**
            
            🔄 [View Build Details](${runUrl})
            
            ### Files in this build:
            | File | For Side |
            |------|----------|
            | \`eyelash_sofle_studio_left.uf2\` | Left (with ZMK Studio) |
            | \`eyelash_sofle_right.uf2\` | Right |
            | \`settings_reset-nice_nano_v2-zmk.uf2\` | Settings reset |
            
            ### Quick Flash Steps:
            1. Click download link above
            2. Download \`firmware.zip\` from Assets
            3. Extract files
            4. Put keyboard in bootloader (press reset twice)
            5. Copy .uf2 to keyboard drive`
            })

