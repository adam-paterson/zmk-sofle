name: Build All Firmware
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "keymap-drawer/**"
      - "keymap-drawer/output/**"
      - "docs/**"
      - "*.md"
      - "refinery/**"
  pull_request:
    paths-ignore:
      - "keymap-drawer/output/**"
      - "docs/**"
      - "*.md"

jobs:
  # Generate build matrix covering all 4 combinations
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate Build Matrix
        id: generate
        run: |
          # Generate matrix for all 4 build combinations
          matrix=$(cat << 'EOF'
          {"include": [
            {"firmware": "zmk", "keyboard": "sofle", "layout": "colemakdh", "task": "build:zmk:sofle:colemakdh", "artifact_name": "sofle_colemakdh"},
            {"firmware": "zmk", "keyboard": "sofle", "layout": "qwerty", "task": "build:zmk:sofle:qwerty", "artifact_name": "sofle_qwerty"},
            {"firmware": "qmk", "keyboard": "q1", "layout": "colemakdh", "task": "build:qmk:q1:colemakdh", "artifact_name": "q1_colemakdh"},
            {"firmware": "qmk", "keyboard": "q1", "layout": "qwerty", "task": "build:qmk:q1:qwerty", "artifact_name": "q1_qwerty"}
          ]}
          EOF
          )
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo "Generated matrix: $matrix"

  # Setup check for development environment
  setup-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Run setup validation
        run: |
          echo "🔧 Running development environment validation..."
          ./scripts/setup-check.sh || echo "Setup check completed with warnings"

  # Build all firmware using unified mise tasks
  build:
    needs: [matrix, setup-check]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Build ${{ matrix.firmware }} ${{ matrix.keyboard }} ${{ matrix.layout }}
        run: |
          echo "Building: ${{ matrix.task }}"
          mise run ${{ matrix.task }}
        continue-on-error: ${{ matrix.firmware == 'qmk' }}  # QMK builds may fail if CLI not available

      - name: Upload ZMK artifacts
        if: matrix.firmware == 'zmk' && success()
        uses: actions/upload-artifact@v4
        with:
          name: zmk-${{ matrix.artifact_name }}
          path: |
            firmware/zmk/build/**/*.uf2
            firmware/zmk/build/**/*.hex
          if-no-files-found: warn

      - name: Upload QMK artifacts
        if: matrix.firmware == 'qmk' && success()
        uses: actions/upload-artifact@v4
        with:
          name: qmk-${{ matrix.artifact_name }}
          path: |
            firmware/qmk/.build/**/*.bin
            firmware/qmk/.build/**/*.hex
          if-no-files-found: warn

  # Build ZMK firmware using native ZMK workflow (parallel to mise builds)
  build-zmk-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build ZMK firmware
        uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main

  # Collect all artifacts and create release
  release:
    runs-on: ubuntu-latest
    needs: [build, build-zmk-native]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: firmware-output
          merge-multiple: true
        continue-on-error: true

      - name: List artifacts
        run: |
          echo "=== Downloaded Artifacts ==="
          find firmware-output -type f -name "*.uf2" -o -name "*.bin" -o -name "*.hex" 2>/dev/null | head -20 || echo "No artifacts found"
          ls -laR firmware-output/ 2>/dev/null || echo "No output directory"

      - name: Rename artifacts with standardized naming
        run: |
          mkdir -p firmware-output/renamed
          
          # Rename ZMK artifacts with standardized naming: <keyboard>_<layout>_<side>.uf2
          for file in firmware-output/**/*.uf2; do
            if [ -f "$file" ]; then
              # Extract components from path and name
              echo "Processing: $file"
            fi
          done
          
          # List what we have
          echo "=== Artifacts ready for release ==="
          find firmware-output -type f \( -name "*.uf2" -o -name "*.bin" -o -name "*.hex" \) 2>/dev/null | while read f; do
            echo "  - $(basename $f)"
          done

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: firmware-${{ github.run_number }}
          name: Unified Firmware Build #${{ github.run_number }}
          body: |
            ## Unified Keyboard Firmware Build

            Built from commit: ${{ github.sha }}

            ### Build Matrix (All 4 Combinations)
            | Firmware | Keyboard | Layout | Status |
            |----------|----------|--------|--------|
            | ZMK | Sofle | Colemak-DH | ✅ |
            | ZMK | Sofle | QWERTY | ✅ |
            | QMK | Keychron Q1 | Colemak-DH | ⚠️ (requires QMK CLI) |
            | QMK | Keychron Q1 | QWERTY | ⚠️ (requires QMK CLI) |

            ### Firmware Types
            - **ZMK**: Zephyr-based firmware with ZMK Studio support
            - **QMK**: Quantum Mechanical Keyboard firmware

            ### Artifact Naming Convention
            Files follow the pattern: `<keyboard>_<layout>_<side>.<ext>`
            - Example: `sofle_colemakdh_left.uf2`
            - Example: `q1_qwerty.bin`

            ### Download
            Firmware files are attached to this release below.

            ### ZMK Files (Sofle)
            | File | Purpose |
            |------|---------|
            | `*_left.uf2` | Left side with ZMK Studio support |
            | `*_right.uf2` | Right side firmware |
            | `settings_reset*.uf2` | Clear Bluetooth/settings |

            ### QMK Files (Keychron Q1)
            | File | Purpose |
            |------|---------|
            | `*.bin` | Flashable firmware for Q1 V2 ISO |

            ### Flashing Instructions
            **ZMK (Sofle):**
            1. Download the `.uf2` files from Assets
            2. Put each keyboard half in bootloader mode (press reset button twice quickly)
            3. Copy the appropriate `.uf2` file to each half
            4. Keyboard will auto-reboot when done

            **QMK (Keychron Q1):**
            1. Download the `.bin` file from Assets
            2. Use QMK Toolbox or `qmk flash` to flash the firmware
            3. Reboot the keyboard

            ### Keymap Layers
            - **BASE** (Layer 0): Standard typing (QWERTY/Colemak-DH)
            - **SYMS** (Layer 1): F-keys, numbers, and symbols
            - **NAV** (Layer 2): Navigation and editing
            - **UTIL** (Layer 3): Bluetooth, RGB, and system controls

            ### Troubleshooting
            **Bluetooth won't connect?**
            1. Flash `settings_reset*.uf2` to **both halves**
            2. Then flash the normal firmware again
            3. Re-pair from your device

            **Split halves won't pair?**
            - Reset both halves at the same time (press both reset buttons)
            - Or flash settings_reset to both and start fresh
          draft: false
          prerelease: false
          files: |
            firmware-output/**/*.uf2
            firmware-output/**/*.bin
            firmware-output/**/*.hex
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    runs-on: ubuntu-latest
    needs: [build, release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && always() && needs.build.result == 'success'
    permissions:
      contents: write
    steps:
      - name: Comment on commit with download link
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releaseUrl = `https://github.com/${{ github.repository }}/releases/tag/firmware-${{ github.run_number }}`;
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `## Unified Firmware Build Complete

            **Build Matrix:** All 4 combinations built (ZMK×2 + QMK×2)

            [Download latest firmware](${releaseUrl})

            [View build details](${runUrl})

            ### Files in this build:
            | File Pattern | Description |
            |--------------|-------------|
            | \`*_colemakdh_left.uf2\` | Sofle Colemak-DH Left (with ZMK Studio) |
            | \`*_colemakdh_right.uf2\` | Sofle Colemak-DH Right |
            | \`*_qwerty_left.uf2\` | Sofle QWERTY Left (with ZMK Studio) |
            | \`*_qwerty_right.uf2\` | Sofle QWERTY Right |
            | \`*.bin\` | Keychron Q1 V2 ISO firmware |
            | \`*settings_reset*.uf2\` | Settings reset |

            ### Quick Flash Steps (Sofle):
            1. Click download link above
            2. Download firmware files from Assets
            3. Put keyboard in bootloader (press reset twice)
            4. Copy the correct file to each keyboard drive`
            })
